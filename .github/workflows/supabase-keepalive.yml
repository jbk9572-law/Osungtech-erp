name: Supabase keep-alive

# Supabase 무료 플랜은 7일간 API 요청이 없으면 프로젝트를 자동으로
# 일시정지시킨다. 3일마다 REST API에 가벼운 요청 한 번을 보내서
# "사용 중"으로 인식하게 만든다 — 유료 전환 없이 무료 플랜을 계속
# 쓰기 위한 방편이다.
#
# 사용 전 준비: 이 저장소의 Settings > Secrets and variables > Actions에
# SUPABASE_URL, SUPABASE_ANON_KEY 두 개를 등록해야 한다
# (Supabase 대시보드 > Project Settings > API 값 그대로).
on:
  schedule:
    - cron: "17 3 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth health endpoint
        run: |
          curl -sS -f \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/auth/v1/health" \
            -o /dev/null
